name: CI Fast

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  fast-checks:
    name: Fast Checks (lock + lint + type + test-fast)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install CI dependencies (frozen)
        run: make sync-ci

      - name: Run fast checks
        run: make ci-fast
